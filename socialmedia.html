<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Veganic stand</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Space Grotesk', 'Inter', 'system-ui', 'sans-serif'],
            body: ['Inter', 'system-ui', 'sans-serif']
          }
        }
      }
    };
  </script>
  <style>
    @font-face {
      font-family: 'BlauerNueBold';
      src: url("tipoografias/blauer Nue/BlauerNue-Bold.woff2") format('woff2'),
           url("tipoografias/blauer Nue/BlauerNue-Bold.woff") format('woff'),
           url("tipoografias/blauer Nue/BlauerNue-Bold.otf") format('opentype');
      font-style: normal;
      font-weight: 700;
      font-display: swap;
    }
    :root {
      --orange: #f24a2a;
      --ink: #121212;
      --page-bg: #ffffff;
    }
    html, body {
      overflow-x: hidden;
      overflow-y: auto;
    }
    body {
      background: #F2EADF;
    }
    .project-title {
      font-family: 'BlauerNueBold', 'Space Grotesk', 'Inter', system-ui, sans-serif;
      font-weight: 700;
      font-synthesis: none;
    }

    .pill-btn {
      border: 0;
      border-radius: 0;
      padding: 6px 22px;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: transparent;
      transition: color 200ms ease, opacity 200ms ease, font-weight 200ms ease;
    }
    .pill-btn:hover {
      color: #111111;
      opacity: 0.6;
      font-weight: 700;
    }

    .hero-card {
      position: relative;
      height: 600px;
      border-radius: 36px;
      background: var(--orange);
      overflow: hidden;
    }

    .badge-grid {
      display: grid;
      gap: 24px;
      margin-top: 140px;
    }

    .badge-card {
      border-radius: 28px;
      height: auto;
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .badge-card.portrait {
      aspect-ratio: 9 / 16;
    }

    .badge-card.black {
      background: #0d0d0d;
      color: #ffffff;
      justify-content: flex-start;
      padding-left: 56px;
    }

    .badge-card.orange {
      background: var(--orange);
      color: #ffffff;
      position: relative;
      z-index: 1;
    }

    .badge-logo {
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: 56px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .badge-star {
      width: 110px;
      height: 110px;
    }

    .badge-meta {
      position: absolute;
      right: 0;
      top: -42px;
      z-index: 2;
      text-align: right;
      font-size: 13px;
      color: rgba(0, 0, 0, 0.7);
    }
    .project-meta {
      margin-top: 1rem;
      color: rgba(0, 0, 0, 0.7);
      font-size: 13px;
      line-height: 1.5;
    }

    .badge-stack {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .showcase-grid {
      display: grid;
      gap: 24px;
      margin-top: 24px;
    }

    .showcase-card {
      border-radius: 28px;
      height: 320px;
      overflow: hidden;
      position: relative;
    }
    .interactive-gallery {
      display: grid;
      grid-template-columns: 490px minmax(0, 1fr);
      align-items: start;
      column-gap: 56px;
      row-gap: 18px;
      width: 100%;
      margin-top: 0;
      margin-bottom: 88px;
      padding-left: 5%;
      padding-right: 5%;
      box-sizing: border-box;
    }
    .gallery-copy {
      flex: 0 0 280px;
      width: 280px;
      max-width: 280px;
      padding-top: 10px;
      margin-left: 210px;
      min-height: 0;
      align-self: stretch;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      text-align: left;
      opacity: 0;
      transform: translateY(48px);
      animation: galleryCopyReveal 900ms cubic-bezier(0.19, 1, 0.22, 1) 120ms forwards;
    }
    .gallery-copy h2 {
      margin: 0 0 18px 0;
      font-size: 46px;
      line-height: 1.1;
      font-family: 'BlauerNueBold', 'Space Grotesk', 'Inter', system-ui, sans-serif;
      font-weight: 700;
      color: #9e2a2b;
    }
    .gallery-copy__subtitle {
      display: block;
      margin: -6px 0 16px !important;
      color: rgba(17, 17, 17, 0.72);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .gallery-copy p {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 1rem;
      line-height: 1.6;
      color: #555555;
    }
    .gallery-copy p + p {
      margin-top: 1.4rem;
    }
    .gallery-copy__pager {
      margin-top: 18px;
      margin-bottom: 0;
      align-self: flex-start;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0;
      border-radius: 0;
      background: transparent;
    }
    .gallery-copy__dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: rgba(120, 120, 120, 0.35);
      border: 0;
      padding: 0;
      cursor: pointer;
      transition: background 180ms ease, transform 180ms ease;
    }
    .gallery-copy__dot.is-active {
      background: rgba(90, 90, 90, 0.95);
    }
    .gallery-copy__dot:hover {
      transform: scale(1.08);
    }
    @keyframes galleryCopyReveal {
      from {
        opacity: 0;
        transform: translateY(48px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    @keyframes galleryThumbRise {
      from {
        opacity: 0;
        transform: translateY(36px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    .gallery-images-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
      width: min(66vw, 1080px);
      min-width: 920px;
      max-width: none;
      margin-left: auto;
      margin-right: 48px;
      padding-right: 0;
    }
    .gallery-viewer {
      width: 100%;
      aspect-ratio: 16 / 7.4;
      position: sticky;
      top: 88px;
      border-radius: 0;
      overflow: hidden;
      background: #ffffff;
    }
    .gallery-viewer img,
    .gallery-viewer video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: opacity 220ms ease;
    }
    .gallery-viewer img.is-fading {
      opacity: 0.2;
    }
    .gallery-footer {
      grid-column: 1 / -1;
      width: 100%;
      padding-left: 210px;
      padding-right: 48px;
    }
    .gallery-thumbs {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 15px;
      width: 100%;
    }
    .gallery-thumb {
      position: relative;
      border-radius: 0;
      padding: 0;
      overflow: hidden;
    }
    .gallery-thumb--post {
      aspect-ratio: 4 / 5;
      background: rgba(255, 255, 255, 0.35);
    }
    .gallery-thumb--post.gallery-thumb--stack {
      border: 0;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.35);
    }
    .gallery-thumb--post.gallery-thumb--stack:focus-visible {
      outline: 2px solid rgba(17, 17, 17, 0.7);
      outline-offset: 3px;
    }
    .gallery-thumb__pager {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.78);
      z-index: 2;
      pointer-events: none;
    }
    .gallery-thumb__dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: rgba(80, 80, 80, 0.35);
    }
    .gallery-thumb__dot.is-active {
      background: rgba(55, 55, 55, 0.95);
    }
    .gallery-thumb--intro {
      opacity: 0;
      transform: translateY(36px);
    }
    .gallery-thumb--intro.is-visible {
      animation: galleryThumbRise 800ms cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }
    .gallery-thumb--intro-onload {
      animation: galleryThumbRise 800ms cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }
    .gallery-thumb--intro-1 { animation-delay: 0ms; }
    .gallery-thumb--intro-2 { animation-delay: 140ms; }
    .gallery-thumb--intro-3 { animation-delay: 280ms; }
    .gallery-thumb--intro-4 { animation-delay: 420ms; }
    .gallery-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 15px;
      grid-column: 1 / -1;
    }
    .gallery-row--mixed {
      align-items: end;
    }
    .gallery-thumb--story.story-ratio-45 {
      aspect-ratio: 4 / 5;
    }
    .gallery-thumb--story {
      aspect-ratio: 9 / 16;
      position: relative;
      padding: 2px;
      border: 0;
      cursor: pointer;
      background:
        linear-gradient(#f2eadf, #f2eadf) padding-box,
        linear-gradient(180deg, #f9ce34 0%, #ee2a7b 48%, #6228d7 100%) border-box;
      overflow: hidden;
    }
    .gallery-thumb--story::before {
      content: "";
      position: absolute;
      inset: 0;
      background: transparent;
      border-radius: 0;
      z-index: 0;
    }
    .gallery-thumb--story:focus-visible {
      outline: 2px solid #ffffff;
      outline-offset: 3px;
    }
    .gallery-story__inner {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 0;
      overflow: hidden;
      background: transparent;
      z-index: 1;
    }
    .gallery-thumb--story img,
    .gallery-thumb--story video {
      background: transparent;
    }
    .gallery-thumb--story.story-no-fill::before,
    .gallery-thumb--story.story-no-fill .gallery-story__inner,
    .gallery-thumb--story.story-no-fill .gallery-thumb video {
      background: transparent;
    }
    .gallery-story__progress {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 4px;
      z-index: 2;
    }
    .gallery-story__bar {
      height: 3px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.28);
      overflow: hidden;
    }
    .gallery-story__bar.is-active,
    .gallery-story__bar.is-complete {
      background: rgba(255, 255, 255, 0.45);
    }
    .gallery-story__bar.is-active::after,
    .gallery-story__bar.is-complete::after {
      content: "";
      display: block;
      height: 100%;
      background: #ffffff;
    }
    .gallery-story__bar.is-active::after {
      width: 100%;
    }
    .gallery-story__bar.is-complete::after {
      width: 100%;
    }
    .gallery-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .gallery-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #6a1b9a;
    }
    .gallery-thumb--post img {
      border-radius: inherit;
    }
    .swatch-card {
      display: grid;
      grid-template-rows: repeat(3, 1fr);
      border-radius: 28px;
    }

    .swatch-band {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 28px;
      font-weight: 600;
    }

    .swatch-band.gray {
      background: #cccccc;
      color: #2a2a2a;
    }

    .swatch-band.black {
      background: #000000;
      color: #ffffff;
    }

    .swatch-band.orange {
      background: #f34a29;
      color: #ffffff;
    }

    .phone-mock {
      position: absolute;
      right: 18%;
      bottom: -18px;
      width: 160px;
      height: 300px;
      border-radius: 28px;
      background: #ffffff;
      border: 5px solid #0d0d0d;
      box-shadow: 0 24px 48px rgba(0, 0, 0, 0.3);
    }

    .phone-mock::before {
      content: "";
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 20px;
      background: #0d0d0d;
      border-radius: 0 0 14px 14px;
    }

    .phone-screen {
      position: absolute;
      inset: 22px 14px 18px;
      border-radius: 18px;
      background: #fafafa;
      border: 1px solid #e5e5e5;
    }

    @media (min-width: 768px) {
      .badge-grid {
        grid-template-columns: minmax(0, 1fr) minmax(0, 0.5625fr);
        align-items: stretch;
      }
      .showcase-grid {
        grid-template-columns: 3fr 2fr;
      }
    }

    @media (max-width: 640px) {
      .site-header { min-height: 60px !important; }
    }
    @media (min-width: 641px) and (max-width: 1023px) {
      .site-header { min-height: 120px !important; }
    }
    @media (max-width: 767px) {
      .interactive-gallery {
        grid-template-columns: 1fr;
        gap: 24px;
        padding-left: 24px;
        padding-right: 24px;
      }
      .gallery-copy {
        flex-basis: auto;
        max-width: none;
        min-height: 0;
        margin-left: 0;
        display: block;
      }
      .gallery-images-block {
        width: 100%;
        min-width: 0;
        margin-left: 0;
        margin-right: 0;
        padding-right: 0;
      }
      .gallery-footer {
        width: 100%;
        grid-column: auto;
        padding-left: 0;
        padding-right: 0;
      }
      .gallery-thumbs {
        grid-template-columns: 1fr;
      }
      .gallery-row {
        grid-template-columns: 1fr 1fr;
      }
      .gallery-viewer {
        position: static;
      }
    }

    @media (max-width: 640px) {
      .badge-card {
        height: auto;
        aspect-ratio: 1 / 1;
        border-radius: 22px;
      }.badge-logo {
        font-size: 38px;
      }
      .badge-star {
        width: 80px;
        height: 80px;
      }
      .showcase-card {
        height: 240px;
        border-radius: 22px;
      }
      .phone-mock {
        right: 12%;
        width: 130px;
        height: 240px;
      }
    }

    .hero-mark {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-size: 72px;
      color: rgba(255, 255, 255, 0.9);
      font-weight: 600;
      letter-spacing: 0.08em;
    }

    .phone {
      position: absolute;
      width: 190px;
      height: auto;
      aspect-ratio: 1 / 1;
      border-radius: 30px;
      background: #ffffff;
      border: 4px solid var(--ink);
      box-shadow: 0 22px 40px rgba(0, 0, 0, 0.28);
      overflow: hidden;
    }

    .phone::before {
      content: "";
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 92px;
      height: 24px;
      background: #0d0d0d;
      border-radius: 0 0 16px 16px;
    }

    .phone.dark {
      background: #121212;
      border-color: #0d0d0d;
    }

    .phone.dark::before {
      background: #1a1a1a;
    }

    .phone .screen {
      position: absolute;
      inset: 18px 14px 20px;
      border-radius: 22px;
      background: #0b0b0b;
      overflow: hidden;
    }

    .phone.light .screen {
      background: #f8f8f8;
    }

    .phone .screen img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .phone-1 { left: 70px; top: -70px; transform: rotate(-1deg); }
    .phone-2 { left: 320px; top: -90px; transform: rotate(1deg); }
    .phone-3 { left: 560px; top: -60px; transform: rotate(-0.5deg); }
    .phone-4 { right: 220px; top: -95px; transform: rotate(1.5deg); }
    .phone-5 { right: 40px; top: -70px; transform: rotate(-1deg); }
    .phone-6 { left: 50%; bottom: -120px; transform: translateX(-50%); }

    .phone-6 .screen {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #ffffff;
      font-size: 18px;
      font-weight: 600;
      padding: 0 18px;
      letter-spacing: 0.04em;
    }

    @media (max-width: 1024px) {
      .hero-card { height: 500px; }
      .phone { width: 150px; height: 300px; }
      .phone-1 { left: 20px; top: -80px; }
      .phone-2 { left: 200px; top: -90px; }
      .phone-3 { left: 380px; top: -70px; }
      .phone-4 { right: 180px; top: -90px; }
      .phone-5 { right: 10px; top: -70px; }
      .phone-6 { bottom: -140px; }
    }

    @media (max-width: 768px) {
      .hero-card { height: 460px; }
      .phone { width: 130px; height: auto;
        aspect-ratio: 1 / 1; }
      .phone-1 { left: 10px; top: -90px; }
      .phone-2 { left: 150px; top: -100px; }
      .phone-3 { left: 290px; top: -90px; }
      .phone-4 { right: 130px; top: -110px; }
      .phone-5 { right: 0; top: -90px; }
      .phone-6 { bottom: -150px; }
    }

    @media (max-width: 640px) {
      .hero-card { height: 420px; border-radius: 28px; }
      .phone-1, .phone-2, .phone-3, .phone-4, .phone-5 { display: none; }
      .phone-6 { width: 170px; height: 320px; bottom: -120px; }
      .hero-mark { font-size: 52px; }
    }

  </style>
</head>
<body class="text-black font-body antialiased min-h-screen">
  <a href="index.html" class="absolute top-0 left-0 w-[120px] h-[60px] sm:w-[240px] sm:h-[120px] lg:w-[360px] lg:h-[180px] flex items-center justify-center overflow-hidden p-1 sm:p-2 lg:p-3" aria-label="Volver al inicio">
    <img src="imagenes/logo%20mio%202.png" alt="Logo Marta" class="w-full h-full object-contain">
  </a>
  <header class="site-header w-full" style="min-height: 180px;">
    <div class="w-full pl-6 pr-6 sm:pl-10 sm:pr-6 pt-8 pb-6 flex items-start justify-between gap-6">
      <div class="flex-1"></div>
      <div class="flex items-center gap-3">
        <a href="proyectos-show.html" class="pill-btn">Proyectos</a>
        <a href="about-me.html" class="pill-btn">Sobre mi</a>
      </div>
    </div>
  </header>
  <div class="w-full px-5 py-0">

    <section class="interactive-gallery">
      <div class="gallery-copy">
        <h2 id="project-heading">Bon o Bon social media</h2>
        <p id="project-subtitle" class="gallery-copy__subtitle">2025-2026</p>
        <p id="project-description">
          Diseño gráfico y creación de contenido para redes sociales, creación de reels y publicidad para el crecimiento de la marca en España.
        </p>
        <div class="gallery-copy__pager" aria-label="Selector de proyectos">
          <button class="gallery-copy__dot is-active" type="button" data-project="bonobon" aria-label="Ver Bon o Bon"></button>
          <button class="gallery-copy__dot" type="button" data-project="tostarica" aria-label="Ver Tostarica"></button>
          <button class="gallery-copy__dot" type="button" data-project="chocolinas" aria-label="Ver Chocolinas"></button>
          <button class="gallery-copy__dot" type="button" data-project="rainbowbio" aria-label="Ver Rainbow Bio"></button>
        </div>
      </div>
      <div class="gallery-images-block">
        <div class="gallery-viewer" id="project-viewer">
          <video
            src="https://res.cloudinary.com/dhlgfmmpf/video/upload/v1781873179/portfolio/bonobon/video.mp4"
            aria-label="Bon o Bon - video principal de la galería"
            muted
            playsinline
            autoplay
            loop
          ></video>
        </div>
      </div>
      <div class="gallery-footer">
        <div class="gallery-thumbs" id="gallery-thumbs" aria-label="Posts de social media"></div>
      </div>
    </section>

  </div>
  <script>
    const projectHeading = document.querySelector('#project-heading');
    const projectSubtitle = document.querySelector('#project-subtitle');
    const projectDescription = document.querySelector('#project-description');
    const projectViewer = document.querySelector('#project-viewer');
    const projectDots = document.querySelectorAll('.gallery-copy__dot');
    let featuredMedia = projectViewer.querySelector('img, video');
    let isFeaturedTransitioning = false;

    const projectStates = {
      bonobon: {
        title: 'Bon o Bon social media',
        subtitle: '2025-2026',
        description: 'Diseño gráfico y creación de contenido para redes sociales, creación de reels y publicidad para el crecimiento de la marca en España.',
        mediaType: 'video',
        mediaSrc: 'https://res.cloudinary.com/dhlgfmmpf/video/upload/v1781873179/portfolio/bonobon/video.mp4',
        mediaAlt: 'Bon o Bon - video principal de la galería'
      },
      tostarica: {
        title: 'Tostarica social media',
        subtitle: '2025-2026',
        description: 'Creación de contenido para redes sociales de Tostarica, trabajando sobre todo con las licencias mensuales.',
        mediaType: 'image',
        mediaSrc: 'https://res.cloudinary.com/dhlgfmmpf/image/upload/v1781874715/portfolio/tostarica/tostarica.gif',
        mediaAlt: 'Tostarica - animación principal de la galería'
      },
      chocolinas: {
        title: 'Chocolinas social media',
        subtitle: '2025-2026',
        description: 'Diseño y adaptación de piezas visuales para redes sociales, reels y publicidad.',
        mediaType: 'image',
        mediaSrc: 'https://res.cloudinary.com/dhlgfmmpf/image/upload/v1781874776/portfolio/chocolinas/chocolinas.gif',
        mediaAlt: 'Chocolinas - animación principal de la galería'
      },
      rainbowbio: {

    const initStoryCards = () => {
      const storyCards = document.querySelectorAll('.gallery-thumb--story');

      storyCards.forEach((storyCard) => {
        const mediaItems = (storyCard.dataset.images || '')
          .split('|')
          .map((item) => item.trim())
          .filter(Boolean);
        let storyMedia = storyCard.querySelector('img, video');
        const progressBars = storyCard.querySelectorAll('.gallery-story__bar');
        let currentIndex = 0;
        let isTransitioning = false;

        const updateProgress = () => {
          progressBars.forEach((bar, index) => {
            bar.classList.toggle('is-complete', index < currentIndex);
            bar.classList.toggle('is-active', index === currentIndex);
          });
        };

        const buildStoryMedia = (mediaItem) => {
          const hasExplicitType = mediaItem.includes(':');
          const [itemType, itemSrc] = hasExplicitType
            ? mediaItem.split(/:(.+)/)
            : ['image', mediaItem];
          const normalizedType = itemType === 'video' ? 'video' : 'image';
          const nextMedia = document.createElement(normalizedType === 'video' ? 'video' : 'img');

          nextMedia.src = itemSrc;

          if (normalizedType === 'video') {
            nextMedia.muted = true;
            nextMedia.playsInline = true;
            nextMedia.autoplay = true;
            nextMedia.loop = true;
          }

          return { nextMedia, normalizedType };
        };

        const waitForMediaReady = (mediaElement, mediaType) => {
          if (mediaType === 'image') {
            if (mediaElement.complete) {
              return Promise.resolve();
            }

            return new Promise((resolve) => {
              mediaElement.addEventListener('load', resolve, { once: true });
              mediaElement.addEventListener('error', resolve, { once: true });
            });
          }

          if (mediaElement.readyState >= 2) {
            return Promise.resolve();
          }

          return new Promise((resolve) => {
            mediaElement.addEventListener('loadeddata', resolve, { once: true });
            mediaElement.addEventListener('error', resolve, { once: true });
          });
        };

        const renderStory = async () => {
          const { nextMedia, normalizedType } = buildStoryMedia(mediaItems[currentIndex]);

          updateProgress();
          isTransitioning = true;

          await waitForMediaReady(nextMedia, normalizedType);

          storyMedia.replaceWith(nextMedia);
          storyMedia = nextMedia;
          isTransitioning = false;
        };

        storyCard.addEventListener('click', async (event) => {
          if (isTransitioning) {
            return;
          }

          const bounds = storyCard.getBoundingClientRect();
          const clickOnRightSide = event.clientX - bounds.left > bounds.width / 2;

          if (clickOnRightSide) {
            currentIndex = (currentIndex + 1) % mediaItems.length;
          } else {
            currentIndex = (currentIndex - 1 + mediaItems.length) % mediaItems.length;
          }

          await renderStory();
        });

        updateProgress();
        renderStory();
      });
    };

    };

    const renderGalleryRows = (projectKey) => {
      const rows = galleryRowsByProject[projectKey] || galleryRowsByProject.bonobon;
      galleryThumbs.innerHTML = rows.map((row) => {
        if (row.type === 'story') {
          return buildStoryRow(row.items);
        }

        if (row.type === 'mixed') {
          return buildMixedRow(row.storyItem, row.postItems, row.observe);
        }

        return buildPostRow(row.items, row.observe);
      }).join('');

      requestAnimationFrame(() => {
        observeAnimatedRows();
        initStoryCards();
        initStackCards();
      });
    };

    renderGalleryRows('bonobon');
  </script>
