  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @font-face {
      font-family: 'BlauerNueBold';
      src: url("tipoografias/blauer Nue/BlauerNue-Bold.woff2") format('woff2'),
           url("tipoografias/blauer Nue/BlauerNue-Bold.woff") format('woff'),
           url("tipoografias/blauer Nue/BlauerNue-Bold.otf") format('opentype');
      font-style: normal;
      font-weight: 700;
      font-display: swap;
    }
    html, body {
      overflow-x: hidden;
      background: #F2EADF;
    }
    .pill-btn {
      border: 0;
      border-radius: 0;
      padding: 8px 24px;
      font-size: 16px;
      font-weight: 400;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: transparent;
      transition: color 200ms ease, opacity 200ms ease, font-weight 200ms ease;
    }
    .pill-btn:hover {
      color: #111111;
      opacity: 0.6;
      font-weight: 700;
    }
    .title-bonobon {
      font-family: 'BlauerNueBold', 'Space Grotesk', 'Inter', system-ui, sans-serif;
      font-weight: 700;
      color: #9e2a2b;
      font-size: 46px;
      line-height: 1.1;
      margin: 0;
    }
    .branding-carousel {
      position: relative;
      overflow: hidden;
      width: 100%;
    }
    .branding-carousel__track {
      display: flex;
      width: 100%;
    }
    .branding-carousel__group {
      display: flex;
      gap: 6px;
      width: 100%;
    }
    .branding-carousel__item {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .branding-carousel__item-img {
      width: 100%;
      height: 380px;
      overflow: hidden;
    }
    .branding-carousel__item-img img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
    }
    .branding-carousel__item-label {
      padding: 0 2px;
    }
    .branding-carousel__item-name {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: #111111;
      margin: 0 0 3px;
    }
    .branding-carousel__item-cat {
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9e2a2b;
      margin: 0;
    }
    @keyframes branding-scroll {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @media (max-width: 640px) {
      .site-header { min-height: 60px !important; }

        flex-direction: column;
      }

    }
    @media (min-width: 641px) and (max-width: 1023px) {

<!-- Project overlay -->
<div id="proj-overlay" style="display:none; position:fixed; inset:0; background:#F2EADF; z-index:9999; flex-direction:column;">
  <div style="display:flex; align-items:center; justify-content:space-between; padding:28px 40px;">
    <div>
      <p id="proj-overlay-cat" style="font-family:'Inter',sans-serif; font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; color:#9e2a2b; margin:0 0 4px;"></p>
      <h2 id="proj-overlay-title" style="font-family:'BlauerNueBold','Inter',sans-serif; font-size:28px; font-weight:700; color:#111; margin:0 0 4px;"></h2>
      <p id="proj-overlay-subtitle" style="font-family:'Inter',sans-serif; font-size:13px; font-weight:400; color:#555; margin:0;"></p>
    </div>
    <button id="proj-overlay-close" style="background:none; border:none; font-size:28px; cursor:pointer; color:#111; line-height:1; padding:8px;">&times;</button>
  </div>

  <div style="flex:1; position:relative; overflow:hidden; display:flex; align-items:center;">
    <button id="proj-prev" style="position:absolute; left:20px; z-index:2; background:none; border:1px solid #111; width:44px; height:44px; border-radius:50%; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;">&#8249;</button>
    <div id="proj-slides" style="display:flex; width:100%; height:100%; align-items:center; justify-content:center; padding:0 80px;">
      <img id="proj-slide-img" style="max-height:70vh; max-width:100%; object-fit:contain; display:block;">
    </div>
    <button id="proj-next" style="position:absolute; right:20px; z-index:2; background:none; border:1px solid #111; width:44px; height:44px; border-radius:50%; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center;">&#8250;</button>
  </div>

  <div style="padding:16px 40px 28px; display:flex; gap:8px; justify-content:center;" id="proj-dots"></div>
</div>

<script>
  const projects = {
    lignify: {
      title: 'Lignify',
      subtitle: 'Trabajo de subdirección de fotografía y rebranding de la marca',
      cat: 'Branding y fotografía',
      images: [
        'imagenes/Lignify/1.jpg',
        'imagenes/Lignify/2.jpg',
        'imagenes/Lignify/3.jpg',
        'imagenes/Lignify/4.jpg',
        'imagenes/Lignify/5.jpg',
        'imagenes/Lignify/6.jpg'
      ]
    },
    pulpa: {
      title: 'PULPA',
      subtitle: 'Branding y diseño de marca ficticia',
      cat: 'Branding',
      images: [
        'imagenes/PULPA/mejorado-Picsart-AiImageEnhancer.jpg',
        'imagenes/PULPA/NUEVO.png',
        'imagenes/PULPA/Mesa%20de%20trabajo%201.jpg',
        'imagenes/PULPA/pulpla%20card%20with%20effect%202.jpg'
      ]
    },
    bloomy: {
      title: 'Bloomy',
      subtitle: 'Diseño de logo',
      cat: 'Logo design',
      images: [
        'imagenes/BRANDING/Bloomy-Photo.png',
        'imagenes/intro/bloomy.jpg'
      ]
    }
  };

  const overlay = document.getElementById('proj-overlay');
  const closeBtn = document.getElementById('proj-overlay-close');
  const titleEl = document.getElementById('proj-overlay-title');
  const subtitleEl = document.getElementById('proj-overlay-subtitle');
  const catEl = document.getElementById('proj-overlay-cat');
  const slideImg = document.getElementById('proj-slide-img');
  const dotsEl = document.getElementById('proj-dots');
  const prevBtn = document.getElementById('proj-prev');
  const nextBtn = document.getElementById('proj-next');

  let currentImages = [];
  let currentIndex = 0;

  const showSlide = (index) => {
    currentIndex = (index + currentImages.length) % currentImages.length;
    slideImg.src = currentImages[currentIndex];
    Array.from(dotsEl.children).forEach((d, i) => {
      d.style.background = i === currentIndex ? '#111' : 'rgba(0,0,0,0.2)';
    });
  };

  const openProject = (key) => {
    const p = projects[key];
    if (!p) return;
    currentImages = p.images;
    titleEl.textContent = p.title;
    subtitleEl.textContent = p.subtitle || '';
    catEl.textContent = p.cat;
    dotsEl.innerHTML = p.images.map(() => `<span style="width:8px;height:8px;border-radius:50%;background:rgba(0,0,0,0.2);display:inline-block;cursor:pointer;transition:background 200ms;"></span>`).join('');
    Array.from(dotsEl.children).forEach((d, i) => d.addEventListener('click', () => showSlide(i)));
    overlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    showSlide(0);
  };

  const closeOverlay = () => {
    overlay.style.display = 'none';
    document.body.style.overflow = '';
  };

  document.querySelectorAll('[data-project]').forEach(card => {
    card.addEventListener('click', () => openProject(card.dataset.project));
  });

  closeBtn.addEventListener('click', closeOverlay);
  prevBtn.addEventListener('click', () => showSlide(currentIndex - 1));
  nextBtn.addEventListener('click', () => showSlide(currentIndex + 1));
  overlay.addEventListener('click', (e) => { if (e.target === overlay) closeOverlay(); });
  document.addEventListener('keydown', (e) => {
    if (overlay.style.display === 'none') return;
    if (e.key === 'ArrowLeft') showSlide(currentIndex - 1);
    if (e.key === 'ArrowRight') showSlide(currentIndex + 1);
    if (e.key === 'Escape') closeOverlay();
  });
</script>
