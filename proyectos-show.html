    }
    .font-grift-regular {
      font-family: "Grift Regular", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }
    .hover-grift-extrabold {

    }

    .pill-btn:hover {

      opacity: 0.7;
      font-weight: 700;
    }
    .project-row {

      border-bottom: 1px solid rgba(255, 255, 255, 0.6);
      padding: 34px 0;
    }
    .project-row:first-child {
      border-top: none;
    }
    .project-row + .project-row {
      border-top: none;
    }
    .project-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      color: inherit;
      text-decoration: none;
      cursor: pointer;
    }
  </style>
